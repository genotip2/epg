name: Auto Update EPG
on:
  workflow_dispatch:
  schedule:
    - cron: '0 5 * * *'

# Menambahkan izin akses agar GitHub Actions bot bisa menulis/push file ke repositori
permissions:
  contents: write

jobs:
  main:
    runs-on: ubuntu-latest
    steps:
      - uses: szenius/set-timezone@v2.0
        with:
          timezoneLinux: "Asia/Jakarta"
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - name: install dependencies
        run: npm install
      - name: check *.channels.xml
        run: |
          npm run channels:lint
      - name: superguide
        run: |
          # Membuat file kosong terlebih dahulu untuk berjaga-jaga jika script grab gagal
          touch super.guide.xml super.guide.xml.gz
          for i in {1..3}; do
            npm run grab -- --channels=super.channels.xml --output=super.guide.xml --maxConnections=1 --gzip && break || sleep 10
          done
      - name: Commit and push changes
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          
          git add super.guide.xml super.guide.xml.gz
          
          # Mengecek apakah ada perubahan/file baru sebelum melakukan commit
          if ! git diff-index --quiet HEAD; then
            HUSKY=0 git commit -m "Auto Update EPG"
            git push
          else
            echo "Tidak ada perubahan data EPG hari ini, melewati proses commit."
          fi
